name: "titan-command-v21"
version: "21.0.0"
description: "Emergency triage simulation for AI agents."
entrypoint: "backend.my_env:EmergencyEnv"
render_modes:
  - "human"
observation_space:
  type: "Dict"
  details:
    budget: "Box(0, 200000, (1,))"
    integrity: "Box(0, 100, (1,))"
    incidents: "Sequence(Incident)"
action_space:
  type: "Discrete"
  details:
    - "0: None"
    - "1: Dispatch Helicopter"
    - "2: Dispatch Fire Truck"
    - "3: Dispatch Ambulance"
tasks:
  - id: "task_1"
    name: "Budget Preservation"
    description: "Maintain the budget."
    difficulty: "easy"
    grader: "tasks.graders:grade_budget"
  - id: "task_2"
    name: "Sector Integrity"
    description: "Prevent integrity from falling to 0."
    difficulty: "easy"
    grader: "tasks.graders:grade_integrity"
  - id: "task_3"
    name: "Lives Saved"
    description: "Save as many lives as possible."
    difficulty: "easy"
    grader: "tasks.graders:grade_lives_saved"
  - id: "task_4"
    name: "Efficiency"
    description: "Manage logistics efficiently."
    difficulty: "medium"
    grader: "tasks.graders:grade_efficiency"
dependencies:
  python: ">=3.10"
  pip:
    - fastapi
    - uvicorn
    - pydantic
    - streamlit
    - plotly
    - requests
    - pandas
    - openai
env:
  API_BASE_URL: "https://api.openai.com/v1"
  MODEL_NAME: "gpt-4o-mini"
  HF_TOKEN: "YOUR_HF_TOKEN"
author: "Commander Sakshar"
license: "MIT"
tags:
  - "Digital Twin"
  - "Crisis Management"
  - "Reinforcement Learning"
